{% extends 'layout.html' %}
{% block body %}

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  body { font-family: 'DM Sans', sans-serif; background: #f0f4ff; }
  h1,h2,h3,h4,h5,h6 { font-family: 'Plus Jakarta Sans', sans-serif; }

  /* ── Page background ── */
  .login-page {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
    position: relative;
    overflow: hidden;
  }
  .login-page::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,0.07) 0%, transparent 70%);
    top: -100px; right: -150px;
    pointer-events: none;
  }
  .login-page::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6,182,212,0.06) 0%, transparent 70%);
    bottom: -80px; left: -100px;
    pointer-events: none;
  }

  /* ── Card ── */
  .login-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(11,23,48,0.10);
    border: 1px solid #e8eef7;
    width: 100%;
    max-width: 500px;
    padding: 40px 40px 36px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  .login-header { text-align: center; margin-bottom: 28px; }
  .login-header .brand-dot {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #2563eb, #06b6d4);
    border-radius: 14px;
    margin-bottom: 14px;
    box-shadow: 0 4px 16px rgba(37,99,235,0.3);
  }
  .login-header .brand-dot i { color: #fff; font-size: 1.4rem; }
  .login-header h4 {
    font-size: 1.4rem; font-weight: 800;
    color: #0b1730; margin-bottom: 4px;
  }
  .login-header p { font-size: 0.88rem; color: #64748b; margin: 0; }

  /* ── Image ── */
  .login-img-wrap { text-align: center; margin-bottom: 22px; }
  .login-img-wrap img {
    max-width: 160px; width: 100%; height: auto;
    filter: drop-shadow(0 4px 12px rgba(37,99,235,0.12));
  }

  /* ── Divider ── */
  .login-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
    margin: 0 0 22px;
    border: none;
  }

  /* ── Labels ── */
  .form-label-custom {
    font-size: 0.83rem;
    font-weight: 600;
    color: #374151;
    letter-spacing: 0.3px;
    margin-bottom: 6px;
    display: block;
  }

  /* ── Input groups ── */
  .input-group-custom { position: relative; margin-bottom: 18px; }
  .input-group-custom .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #94a3b8; font-size: 0.9rem; z-index: 5; pointer-events: none;
  }
  .input-group-custom input,
  .input-group-custom select {
    padding-left: 40px !important;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px !important;
    height: 46px;
    font-size: 0.9rem;
    color: #1e293b;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #f8faff;
    width: 100%;
  }
  .input-group-custom input:focus,
  .input-group-custom select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: #fff;
    outline: none;
  }
  .input-group-custom select { appearance: none; -webkit-appearance: none; cursor: pointer; }

  /* ── Camera section ── */
  .camera-section {
    background: #f8faff;
    border: 1.5px solid #e2e8f0;
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    margin-bottom: 18px;
  }
  .camera-label {
    font-size: 0.8rem; font-weight: 600;
    color: #475569; text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .camera-label i { color: #2563eb; }
  .camera-section video {
    width: 100%; max-width: 340px;
    height: auto; aspect-ratio: 370/320;
    border-radius: 10px;
    background: #0b1730;
    display: block; margin: 0 auto 10px;
  }
  .camera-section canvas { display: none; }
  #snapshot img {
    width: 100%; max-width: 340px;
    border-radius: 10px;
    margin-top: 8px;
    border: 2px solid #2563eb;
  }
  .btn-capture-custom {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(37,99,235,0.08);
    color: #2563eb;
    border: 1.5px solid rgba(37,99,235,0.25);
    border-radius: 24px;
    padding: 7px 20px;
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    margin-top: 4px;
  }
  .btn-capture-custom:hover { background: #2563eb; color: #fff; border-color: #2563eb; }

  /* ── Forgot password ── */
  .forgot-link {
    font-size: 0.82rem; color: #2563eb;
    font-weight: 600; text-decoration: none;
  }
  .forgot-link:hover { text-decoration: underline; }

  /* ── Submit button ── */
  .btn-signin {
    width: 100%;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 0.97rem; font-weight: 700;
    font-family: 'Plus Jakarta Sans', sans-serif;
    letter-spacing: 0.2px;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(37,99,235,0.35);
    cursor: pointer;
    margin-top: 6px;
  }
  .btn-signin:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(37,99,235,0.45); }
  .btn-signin:active { transform: translateY(0); }

  /* ── Register link ── */
  .register-prompt {
    text-align: center; margin-top: 20px;
    font-size: 0.88rem; color: #64748b;
  }
  .register-prompt a { color: #2563eb; font-weight: 600; text-decoration: none; }
  .register-prompt a:hover { text-decoration: underline; }

  /* ── Security badge ── */
  .security-badge {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 16px;
    font-size: 0.75rem; color: #94a3b8; font-weight: 500;
  }
  .security-badge i { color: #22c55e; font-size: 0.8rem; }
</style>

<div class="login-page">
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="brand-dot"><i class="fas fa-shield-alt"></i></div>
      <h4>Welcome back</h4>
      <p>Sign in to your MyProctor.ai account</p>
    </div>

    <!-- Secure Image -->
    <div class="login-img-wrap">
      <img src="{{ url_for('static', filename='secure_login.png') }}" alt="Secure Login">
    </div>

    <hr class="login-divider">

    <!-- Form -->
    <form action="/login" method="POST">

      <!-- Email -->
      <label class="form-label-custom">Email Address</label>
      <div class="input-group-custom">
        <i class="fas fa-envelope input-icon"></i>
        <input name="email" type="email" placeholder="example@company.com" required>
      </div>

      <!-- Password -->
      <label class="form-label-custom">Password</label>
      <div class="input-group-custom">
        <i class="fas fa-lock input-icon"></i>
        <input name="password" type="password" placeholder="Enter your password" required>
      </div>

      <!-- User Type -->
      <label class="form-label-custom">Login As</label>
      <div class="input-group-custom">
        <i class="fas fa-user-tag input-icon"></i>
        <select name="user_type" required>
          <option value="student">Student</option>
          <option value="teacher">Professor</option>
        </select>
      </div>

      <!-- Camera / Face Verification -->
      <div class="camera-section">
        <div class="camera-label">
          <i class="fas fa-camera"></i> Face Verification
        </div>
        <video id="stream" autoplay playsinline></video>
        <canvas id="capture" width="370" height="320"></canvas>
        <div id="snapshot"></div>
        <button id="btn-capture" type="button" class="btn-capture-custom">
          <i class="fas fa-camera-retro"></i> Capture Photo
        </button>
        <input type="hidden" id="image_hidden" name="image_hidden">
      </div>

      <!-- Forgot Password -->
      <div class="d-flex justify-content-end mb-3">
        <a href="/lostpassword" class="forgot-link">
          <i class="fas fa-key mr-1"></i> Forgot password?
        </a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-signin">
        <i class="fas fa-sign-in-alt mr-2"></i> Sign In Securely
      </button>

    </form>

    <!-- Register -->
    <div class="register-prompt">
      Not registered yet?
      <a href="/register">Create a free account →</a>
    </div>

    <!-- Security note -->
    <div class="security-badge">
      <i class="fas fa-check-circle"></i> 256-bit SSL Encrypted &nbsp;·&nbsp;
      <i class="fas fa-check-circle"></i> AI Face Verified
    </div>

  </div>
</div>

<!-- Camera Script (unchanged logic) -->
<script>
  var btnCapture   = document.getElementById("btn-capture");
  var stream       = document.getElementById("stream");
  var capture      = document.getElementById("capture");
  var snapshot     = document.getElementById("snapshot");
  var cameraStream = null;

  btnCapture.addEventListener("click", captureSnapshot);

  function startStreaming() {
    var mediaSupport = 'mediaDevices' in navigator;
    if (mediaSupport && null == cameraStream) {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(function (mediaStream) {
          cameraStream = mediaStream;
          stream.srcObject = mediaStream;
          stream.play();
        })
        .catch(function (err) {
          console.log("Unable to access camera: " + err);
        });
    } else {
      alert('Your browser does not support media devices.');
    }
  }

  function stopStreaming() {
    if (null != cameraStream) {
      cameraStream.getTracks()[0].stop();
      stream.load();
      cameraStream = null;
    }
  }

  function captureSnapshot() {
    if (null != cameraStream) {
      var ctx = capture.getContext('2d');
      var img = new Image();
      ctx.drawImage(stream, 0, 0, capture.width, capture.height);
      img.src    = capture.toDataURL("image/png");
      img.style.width  = "100%";
      img.style.maxWidth = "340px";
      snapshot.innerHTML = '';
      snapshot.appendChild(img);
      var res = capture.toDataURL("image/png").replace("data:image/png;base64,", "");
      $("#image_hidden").val(res);
    }
  }

  window.onload = function () {
    startStreaming();
    captureSnapshot();
  };
</script>

{% endblock %}
