{% extends 'layout.html' %}
{% block body %}

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  body { font-family: 'DM Sans', sans-serif; }
  h1,h2,h3,h4,h5,h6 { font-family: 'Plus Jakarta Sans', sans-serif; }

  .report-card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(11,23,48,0.08);
    border: 1px solid #e8eef7;
    max-width: 560px;
    margin: 0 auto;
    padding: 36px 36px 32px;
  }

  .report-header { text-align: center; margin-bottom: 24px; }
  .report-header .icon-wrap {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #06b6d4, #0891b2);
    border-radius: 14px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(6,182,212,0.3);
  }
  .report-header .icon-wrap i { color: #fff; font-size: 1.3rem; }
  .report-header h4 { font-size: 1.25rem; font-weight: 800; color: #0b1730; margin-bottom: 4px; }
  .report-header p { font-size: 0.86rem; color: #64748b; margin: 0; }

  .report-img { text-align: center; margin-bottom: 22px; }
  .report-img img { max-width: 150px; width: 100%; filter: drop-shadow(0 4px 10px rgba(6,182,212,0.12)); }

  .report-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
    margin: 0 0 22px; border: none;
  }

  .form-label-custom {
    font-size: 0.83rem; font-weight: 600;
    color: #374151; letter-spacing: 0.3px;
    margin-bottom: 6px; display: block;
  }

  .input-group-custom { position: relative; margin-bottom: 18px; }
  .input-group-custom .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #94a3b8; font-size: 0.9rem; z-index: 5; pointer-events: none;
  }
  .input-group-custom input {
    padding-left: 40px !important;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px !important;
    font-size: 0.9rem; color: #1e293b;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #f8faff;
    width: 100%;
    height: 46px;
  }
  .input-group-custom input:focus {
    border-color: #06b6d4;
    box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
    background: #fff; outline: none;
  }

  .btn-report {
    width: 100%;
    background: linear-gradient(135deg, #06b6d4, #0891b2);
    color: #fff; border: none;
    border-radius: 12px; padding: 13px;
    font-size: 0.97rem; font-weight: 700;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(6,182,212,0.35);
    cursor: pointer; margin-top: 4px;
  }
  .btn-report:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(6,182,212,0.45); }
  .btn-report:active { transform: translateY(0); }

  .back-link {
    display: block; text-align: center; margin-top: 18px;
    font-size: 0.85rem; color: #64748b; text-decoration: none;
  }
  .back-link:hover { color: #0891b2; }
  .back-link i { margin-right: 5px; }
</style>

<main>
  <section class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 40px 16px;">
    <div class="report-card w-100">

      <!-- Header -->
      <div class="report-header">
        <div class="icon-wrap"><i class="fas fa-paper-plane"></i></div>
        <h4>Lost Password?</h4>
        <p>Enter your email and we'll send you an OTP to reset it.</p>
      </div>

      <!-- Image -->
      <div class="report-img">
        <img src="{{ url_for('static', filename='forgot_password.png') }}" alt="Forgot Password">
      </div>

      <hr class="report-divider">

      <!-- Form -->
      <form action="/lostpassword" method="POST">

        <label class="form-label-custom">Email Address</label>
        <div class="input-group-custom">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" name="lpemail" placeholder="example@company.com" required>
        </div>

        <button type="submit" class="btn-report">
          <i class="fas fa-paper-plane mr-2"></i> Send OTP
        </button>

      </form>

      <a href="/login" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>

    </div>
  </section>
</main>

{% endblock %}
